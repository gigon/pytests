name: test1

on:
  workflow_dispatch:

jobs:
  build:
    env:
      PY_COLORS: "1"
    runs-on: ubuntu
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        browser: [chrome]
    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"
        architecture: "x64"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade wheel
        #pip install -r requirements.txt
        pip install seleniumbase
        
    - name: Install Chrome
      if: matrix.browser == 'chrome'
      run: |
        apt-get install -y google-chrome-stable

    - name: chrome-ubuntu-workaround
      if: matrix.browser == 'chrome'
      run: |
        apt-get update
        apt-get install -y libgconf-2-4 libatk1.0-0 libatk-bridge2.0-0 libgdk-pixbuf2.0-0 libgtk-3-0 libgbm-dev libnss3-dev libxss-dev libasound2

#    - uses: browser-actions/setup-chrome@latest
#      if: matrix.browser == 'chrome'

    - uses: actions/checkout@v3

    - name: Check the console scripts interface
      run: |
        seleniumbase
#        sbase

    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver

    - name: Run pytest test_mfa_login.py --browser=chrome --xvfb
      run: |
        pytest test_mfa_login.py --browser=chrome --xvfb -v -s --junit-xml=junit/test-results.xml
